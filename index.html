<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ingeniero Espacial · Links</title>
  <meta name="description" content="Links oficiales de Ingeniero Espacial: YouTube, TikTok e Instagram." />
  <style>
    :root{
      --card: rgba(10, 12, 18, 0.72);
      --stroke: rgba(255,255,255,0.10);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.70);
      --btn: rgba(255,255,255,0.92);
      --btnText: rgba(0,0,0,0.92);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100svh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: #070812;
      overflow-x:hidden;
    }

    /* Fondo: imagen + overlay */
    .bg{
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(6,7,14,0.75), rgba(6,7,14,0.92)),
        url("assets/space-bg.jpg") center/cover no-repeat;
      filter: saturate(1.1) contrast(1.05);
      z-index:-2;
    }

    /* Satélite (SVG) flotando */
    .sat{
      position: fixed;
      inset: 0;
      z-index:-1;
      pointer-events:none;
      opacity: 0.35;
      transform: translate3d(0,0,0);
    }
    .sat svg{
      position:absolute;
      right: -60px;
      top: 90px;
      width: min(520px, 92vw);
      height:auto;
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.55));
      transform: rotate(-8deg);
    }

    .wrap{
      max-width: 720px;
      margin: 0 auto;
      padding: 42px 18px 60px;
      display:flex;
      justify-content:center;
    }

    .card{
      width:100%;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      padding: 24px 18px 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.45);
    }

    .top{
      display:flex;
      align-items:center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .avatar{
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      letter-spacing: 0.5px;
    }
    h1{
      font-size: 20px;
      line-height: 1.15;
      margin:0;
    }
    .subtitle{
      margin: 4px 0 0;
      font-size: 14px;
      color: var(--muted);
    }

    .links{
      margin-top: 16px;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }
    .btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 14px;
      width:100%;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--text);
      text-decoration:none;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.16);
    }
    .btn strong{font-size: 15px}
    .btn span{font-size: 13px; color: var(--muted)}
    .pill{
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--btn);
      color: var(--btnText);
      font-size: 12px;
      font-weight: 700;
      white-space:nowrap;
    }

    .footer{
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      display:flex;
      justify-content:space-between;
      gap: 12px;
      flex-wrap:wrap;
    }
    .footer a{ color: rgba(255,255,255,0.70); text-decoration:none; }
    .footer a:hover{ text-decoration:underline; }

    @media (max-width: 420px){
      .sat svg{ right: -120px; top: 60px; opacity: 0.32; }
      .avatar{ width:52px; height:52px; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="sat" aria-hidden="true">
    <!-- Satélite simple (SVG) para no depender de PNGs/licencias -->
    <svg viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g opacity="0.95">
        <!-- panel izquierdo -->
        <rect x="60" y="210" width="240" height="100" rx="10" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" />
        <path d="M90 230H270M90 255H270M90 280H270" stroke="rgba(255,255,255,0.18)" />
        <!-- panel derecho -->
        <rect x="600" y="210" width="240" height="100" rx="10" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" />
        <path d="M630 230H810M630 255H810M630 280H810" stroke="rgba(255,255,255,0.18)" />

        <!-- brazo -->
        <rect x="300" y="252" width="300" height="16" rx="8" fill="rgba(255,255,255,0.14)" />

        <!-- cuerpo satélite -->
        <rect x="392" y="180" width="116" height="160" rx="16" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.22)" />
        <rect x="408" y="198" width="84" height="30" rx="10" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.18)"/>

        <!-- antena -->
        <circle cx="450" cy="140" r="34" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)"/>
        <path d="M450 174V180" stroke="rgba(255,255,255,0.22)" stroke-width="6" stroke-linecap="round"/>
        <path d="M420 140C435 126 465 126 480 140" stroke="rgba(255,255,255,0.18)" stroke-width="4" stroke-linecap="round"/>
        <path d="M410 140C430 116 470 116 490 140" stroke="rgba(255,255,255,0.12)" stroke-width="4" stroke-linecap="round"/>
      </g>
    </svg>
  </div>

  <main class="wrap">
    <section class="card">
      <div class="top">
        <div class="avatar">IE</div>
        <div>
          <h1>Ingeniero Espacial</h1>
          <p class="subtitle">Contenido de espacio explicado claro y sin humo.</p>
        </div>
      </div>

      <div class="links">
        <a class="btn" href="https://www.youtube.com/@Ingeniero.Espacial" target="_blank" rel="noopener">
          <div>
            <strong>YouTube</strong><br/>
            <span>@Ingeniero.Espacial</span>
          </div>
          <div class="pill">Ver vídeos</div>
        </a>

        <a class="btn" href="https://www.tiktok.com/@ingenieroespacial" target="_blank" rel="noopener">
          <div>
            <strong>TikTok</strong><br/>
            <span>@ingenieroespacial</span>
          </div>
          <div class="pill">Abrir</div>
        </a>

        <a class="btn" href="https://www.instagram.com/ingeniero.espacial/" target="_blank" rel="noopener">
          <div>
            <strong>Instagram</strong><br/>
            <span>@ingeniero.espacial</span>
          </div>
          <div class="pill">Seguir</div>
        </a>

        <!-- Opcional: añade más botones aquí -->
        <!--
        <a class="btn" href="https://tuweb.com" target="_blank" rel="noopener">
          <div>
            <strong>Web</strong><br/>
            <span>tuweb.com</span>
          </div>
          <div class="pill">Entrar</div>
        </a>
        -->
      </div>

      <div class="footer">
        <span>© <span id="y"></span> Ingeniero Espacial</span>
        <a href="#" onclick="navigator.clipboard.writeText(window.location.href); return false;">Copiar link</a>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
  </script>
</body>
</html>
